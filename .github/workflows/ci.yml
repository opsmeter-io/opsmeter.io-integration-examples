name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  node:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: examples/node/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Lint (py_compile)
        run: python3 -m py_compile examples/python/main.py examples/python/telemetry.py examples/python/tests/test_telemetry.py
      - name: Unit tests
        run: python3 -m unittest discover -s examples/python/tests -v

  dotnet:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/dotnet
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - run: dotnet restore Opsmeter.IntegrationExamples.sln
      - run: dotnet build Opsmeter.IntegrationExamples.sln --configuration Release --no-restore
      - run: dotnet test Opsmeter.IntegrationExamples.sln --configuration Release --no-build --verbosity normal

  smoke:
    runs-on: ubuntu-latest
    needs: [node, python, dotnet]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - run: ./scripts/smoke.sh
        env:
          OPSMETER_DRY_RUN: "1"
          OPSMETER_API_KEY: "dummy-key"
